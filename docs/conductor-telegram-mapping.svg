<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Conductor to Telegram mapping</title>
  <desc id="desc">A side-by-side diagram showing how Conductor repositories, workspaces, chats, and Codex turns map to Telegram repo pickers, branch pickers, current chat targets, and message streams.</desc>
  <defs>
    <linearGradient id="panelFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdf4"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .panel-title {
        fill: #111827;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 28px;
        font-weight: 700;
      }
      .card-title {
        fill: #111827;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 22px;
        font-weight: 700;
      }
      .card-note {
        fill: #475569;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 18px;
        font-weight: 500;
      }
      .mapping-note {
        fill: #4b5563;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        font-weight: 600;
      }
      .panel {
        fill: url(#panelFill);
        stroke: #d9c97a;
        stroke-width: 2;
      }
      .card {
        fill: url(#cardFill);
        stroke: #8fb7d8;
        stroke-width: 2;
        filter: url(#shadow);
      }
      .connector {
        stroke: #4b5563;
        stroke-width: 3;
        stroke-linecap: round;
      }
    </style>
  </defs>

  <rect width="1400" height="560" fill="#ffffff"/>

  <rect class="panel" x="40" y="36" width="620" height="488" rx="28"/>
  <rect class="panel" x="740" y="36" width="620" height="488" rx="28"/>

  <text class="panel-title" x="80" y="88">Conductor on the same Mac</text>
  <text class="panel-title" x="780" y="88">Telegram</text>

  <rect class="card" x="100" y="120" width="420" height="74" rx="18"/>
  <rect class="card" x="100" y="220" width="420" height="74" rx="18"/>
  <rect class="card" x="100" y="320" width="420" height="74" rx="18"/>
  <rect class="card" x="100" y="420" width="420" height="74" rx="18"/>

  <rect class="card" x="800" y="120" width="420" height="74" rx="18"/>
  <rect class="card" x="800" y="220" width="420" height="74" rx="18"/>
  <rect class="card" x="800" y="320" width="420" height="74" rx="18"/>
  <rect class="card" x="800" y="420" width="420" height="74" rx="18"/>

  <text class="card-title" x="140" y="165">Repository</text>
  <text class="card-title" x="140" y="265">Workspace (branch)</text>
  <text class="card-title" x="140" y="365">Chat / session</text>
  <text class="card-title" x="140" y="465">Codex thread and turns</text>

  <text class="card-title" x="840" y="165">Repo picker</text>
  <text class="card-title" x="840" y="265">Branch picker</text>
  <text class="card-title" x="840" y="358">Current chat target</text>
  <text class="card-note" x="840" y="384">private chat or topic</text>
  <text class="card-title" x="840" y="458">Plain-text messages</text>
  <text class="card-note" x="840" y="484">and streamed updates</text>

  <line class="connector" x1="310" y1="194" x2="310" y2="220" marker-end="url(#arrowHead)"/>
  <line class="connector" x1="310" y1="294" x2="310" y2="320" marker-end="url(#arrowHead)"/>
  <line class="connector" x1="310" y1="394" x2="310" y2="420" marker-end="url(#arrowHead)"/>

  <line class="connector" x1="1010" y1="194" x2="1010" y2="220" marker-end="url(#arrowHead)"/>
  <line class="connector" x1="1010" y1="294" x2="1010" y2="320" marker-end="url(#arrowHead)"/>
  <line class="connector" x1="1010" y1="394" x2="1010" y2="420" marker-end="url(#arrowHead)"/>

  <line class="connector" x1="560" y1="157" x2="760" y2="157" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)"/>
  <line class="connector" x1="560" y1="257" x2="760" y2="257" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)"/>
  <line class="connector" x1="560" y1="357" x2="760" y2="357" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)"/>
  <line class="connector" x1="560" y1="457" x2="760" y2="457" marker-start="url(#arrowHead)" marker-end="url(#arrowHead)"/>

  <text class="mapping-note" x="602" y="140">pick repo</text>
  <text class="mapping-note" x="594" y="240">pick branch</text>
  <text class="mapping-note" x="566" y="340">continue current chat</text>
  <text class="mapping-note" x="560" y="440">exchange prompts and output</text>
</svg>
